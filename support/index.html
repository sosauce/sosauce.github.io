<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/conversation/conversation.css">
    <script src="/conversation/components.js"></script>
    <title>Support</title>
</head>

<body>
    <div class="scaffold">
        <convo-header name="Support">

            <div class="bubbles">
                <div class="bubble">
                    <h2>There is 2 main ways you can support me! The first one is by using my support pages listed
                        below, the second way is to spread the word about my
                        <a href="/projects"><span> projects</span></a>!
                        However you decide to support me, it means a lot to me, so thank you ❤️!!!
                    </h2>
                </div>
                <div class="logos">
                    <div class="logo">
                        <a href="https://ko-fi.com/sosauce">
                            <img src="/resources/kofi.svg" alt="Kofi">
                        </a>
                    </div>
                    <div class="logo">
                        <a href="https://paypal.com/paypalme/sosauce">
                            <img src="/resources/paypal.svg" alt="Paypal">
                        </a>
                    </div>
                </div>
            </div>
            <footer>
                <img src="/resources/add.svg" alt="Add" class="iconButton">
                <input type="text" disabled>
                <img src="/resources/send_filled.svg" alt="Add" class="iconButton">
            </footer>
    </div>
</body>

</html>
